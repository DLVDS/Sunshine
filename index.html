<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Owner</title>
<style>
  :root{--ink:#1e2a5e;--mint:#bdece0;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--mint);padding:24px;}
  .card{background:#fff;border-radius:20px;max-width:380px;width:100%;padding:36px 28px;box-shadow:0 12px 40px rgba(30,42,94,.15);text-align:center;}
  h1{color:var(--ink);font-size:24px;margin-bottom:6px;}
  p{color:#5a6285;font-size:15px;margin-bottom:28px;}
  a.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px;border-radius:14px;font-size:18px;font-weight:600;text-decoration:none;margin-bottom:14px;transition:transform .08s;}
  a.btn:active{transform:scale(.98);}
  .call{background:var(--ink);color:#fff;}
  .email{background:#eef0f8;color:var(--ink);}
  .num{color:var(--ink);font-weight:700;font-size:20px;margin-top:22px;letter-spacing:1px;}
</style>
</head>
<body>
  <div class="card">
    <h1>Contact Owner</h1>
    <p>Private sale — get in touch about this property.</p>
    <a class="btn call" href="tel:+61461479857">📞 Call Owner</a>
    <a class="btn email" href="mailto:rdbmp0626@gmail.com?subject=Property%20enquiry&body=Hi%2C%20I%E2%80%99m%20interested%20in%20the%20property%20advertisement.%20Please%20contact%20me%20with%20more%20details.">✉️ Email Enquiry</a>
    <div class="num">1300 003 726</div>
  </div>
</body>
</html>
